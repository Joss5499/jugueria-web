<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fresh Juice - Juguería</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
    <h1>🍹 Fresh Juice</h1>
    <nav>
        <a href="#inicio">Inicio</a>
        <a href="#productos">Jugos</a>
        <a href="#contacto">Contacto</a>
    </nav>
</header>

<main>

    <!-- HERO / BIENVENIDA -->
    <section id="inicio" class="hero">
        <h2>Jugos naturales y saludables</h2>
        <p>Disfruta lo mejor de la fruta fresca todos los días</p>
    </section>

    <!-- CARRUSEL -->
    <section class="carrusel">
        <button class="btn prev" onclick="anterior()">❮</button>

        <div class="carrusel-contenedor">
            <img id="imagenCarrusel" src="img/jugo1.png" alt="Jugos">
        </div>

        <button class="btn next" onclick="siguiente()">❯</button>
    </section>

    <!-- PRODUCTOS -->
    <section id="productos" class="productos">
        <h2>Nuestros Jugos</h2>

        <div class="cards">
            <div class="card">
                <h3>Naranja 🍊</h3>
                <p>Refrescante y natural</p>
            </div>

            <div class="card">
                <h3>Fresa 🍓</h3>
                <p>Dulce y energética</p>
            </div>

            <div class="card">
                <h3>Verde 🥬</h3>
                <p>Detox y saludable</p>
            </div>
        </div>
    </section>

    <!-- INTERACCIÓN -->
    <section class="promo">
        <p id="mensaje">Descubre nuestras promociones</p>
        <button id="btnPromo">Ver oferta</button>
    </section>

</main>

<footer id="contacto">
    <p>© 2026 Fresh Juice | Síguenos en 
        <a href="https://github.com" target="_blank">GitHub</a>
    </p>
</footer>

<script src="script.js"></script>
</body>
</html>
